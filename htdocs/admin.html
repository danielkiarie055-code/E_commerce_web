<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luxe Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #f4f7f6; 
            margin: 0; 
            padding: 20px; 
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #111; 
            color: white; 
            padding: 20px 40px; 
            border-radius: 8px; 
            margin-bottom: 30px; 
        }

        .logout-btn { 
            background: #ff4757; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
        }


        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            margin-bottom: 30px; 
        }

        h2 { 
            border-bottom: 2px solid #eee; 
            padding-bottom: 10px; 
            margin-bottom: 20px; 
            color: #333; 
        }
        
        .form-row { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
            margin-bottom: 15px; 
        }

        .form-row input, .form-row select { 
            flex: 1; 
            min-width: 200px; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-family: 'Poppins', sans-serif; 
        }
        
        .file-upload-wrapper { 
            flex: 1; 
            min-width: 200px; 
            display: flex; 
            flex-direction: column; 
        }

        .file-upload-wrapper label { 
            font-size: 12px; 
            color: #666; 
            margin-bottom: 5px; 
            font-weight: bold; 
        }
        
        .submit-btn { 
            padding: 15px; 
            background: #2ed573; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
            font-family: 'Poppins', sans-serif; 
        }

        .submit-btn:hover { 
            background: #26b360; 
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
            font-size: 15px; 
        }

        th, td { 
            padding: 15px; 
            text-align: left; 
            border-bottom: 1px solid #ddd; 
        }

        th { 
            background-color: #f9f9f9; 
            color: #111; 
            font-weight: 600; 
        }
        .action-btn { 
            padding: 8px 15px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-right: 5px; 
        }
        .btn-edit { 
            background: #f39c12; 
            color: white; 
        }
        .btn-delete { 
            background: #ff4757; 
            color: white; 
        }
        .btn-complete { 
            background: #2ed573; 
            color: white; 
        }
    </style>
    
    <script>
        if(sessionStorage.getItem('luxe_admin_logged_in') !== 'true') {
            window.location.href = 'admin_login.html';
        }
        function logoutAdmin() {
            sessionStorage.removeItem('luxe_admin_logged_in');
            window.location.href = 'admin_login.html';
        }
    </script>
</head>
<body>

    <div class="header">
        <h1>Luxe Management</h1>
        <button class="logout-btn" onclick="logoutAdmin()">Logout</button>
    </div>

    <div class="container">
        <h2>Register New Product</h2>
        <form id="add-product-form" onsubmit="addProduct(event)">
            <div class="form-row">
                <input type="text" id="p-name" placeholder="Product Name" required>
                <select id="p-category" required>
                    <option value="" disabled selected>Select Category</option>
                    <option value="women">Women</option>
                    <option value="men">Men</option>
                    <option value="shoes">Shoes</option>
                    <option value="bags">Bags</option>
                </select>
            </div>
            <div class="form-row">
                <input type="number" id="p-price" placeholder="Price (Ksh)" required>
                <input type="number" id="p-stock" placeholder="Stock Quantity" required>
                <div class="file-upload-wrapper">
                    <label for="p-image">Upload Product Image</label>
                    <input type="file" id="p-image" accept="image/*" required style="padding: 9px;">
                </div>
            </div>
            <button type="submit" class="submit-btn">Upload & Register Product</button>
        </form>
    </div>

    <div class="container">
        <h2>Inventory Management</h2>
        <table>
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Product Name</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="admin-table"></tbody>
        </table>
    </div>

    <div class="container">
        <h2>Customer Orders</h2>
        <table>
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer Name</th>
                    <th>Total Paid</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="orders-table"></tbody>
        </table>
    </div>

    <div id="edit-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:2000; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:8px; width:90%; max-width:400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <h3 style="margin-bottom:20px; color:#111; border-bottom:2px solid #eee; padding-bottom:10px;">Update Product Details</h3>
            
            <form onsubmit="saveEdit(event)">
                <input type="hidden" id="edit-id">
                
                <label style="font-size:13px; font-weight:bold; color:#555;">Product Name / Offer</label>
                <input type="text" id="edit-name" required style="width:100%; padding:12px; margin-top:5px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px; font-family:'Poppins', sans-serif;">

                <label style="font-size:13px; font-weight:bold; color:#555;">Price (Ksh)</label>
                <input type="number" id="edit-price" required style="width:100%; padding:12px; margin-top:5px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px; font-family:'Poppins', sans-serif;">

                <label style="font-size:13px; font-weight:bold; color:#555;">Stock Quantity</label>
                <input type="number" id="edit-stock" required style="width:100%; padding:12px; margin-top:5px; margin-bottom:25px; border:1px solid #ccc; border-radius:4px; font-family:'Poppins', sans-serif;">

                <div style="display:flex; gap:10px;">
                    <button type="button" onclick="document.getElementById('edit-modal').style.display='none'" style="flex:1; padding:12px; background:#ff4757; color:white; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">Cancel</button>
                    <button type="submit" style="flex:1; padding:12px; background:#f39c12; color:white; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js?v=14"></script>
</body>
</html>
