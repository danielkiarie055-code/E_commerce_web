<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Luxe Fashion</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #111; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .login-box { 
            background: white; 
            padding: 50px 40px; 
            border-radius: 8px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }

        .login-box h2 { 
            margin-bottom: 30px; 
            color: #333; 
            font-size: 28px; 
        }
        input { 
            width: 100%; 
            padding: 18px; 
            margin-bottom: 20px; 
            border: 2px solid #eee; 
            border-radius: 5px; 
            box-sizing: border-box; 
            font-size: 16px; 
            outline: none; 
        }
        input:focus { 
            border-color: #d3a052; 
        }

        button { 
            width: 100%; 
            padding: 18px; 
            background: #d3a052; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-size: 18px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase; 
        }

        button:hover { 
            background: #b88a44; 
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Luxe Admin Access</h2>
        <input type="text" id="admin-user" placeholder="Username">
        <input type="password" id="admin-pass" placeholder="Password">
        <button onclick="verifyLogin()">Secure Login</button>
        <p id="error-msg" style="color: red; display: none; margin-top: 15px; font-weight: bold;">Incorrect username or password.</p>
    </div>

    <script>
        function verifyLogin() {
            let u = document.getElementById('admin-user').value;
            let p = document.getElementById('admin-pass').value;

            
            if(u === 'admin' && p === 'kca2026') {
                // Save a secure "token" in the browser
                sessionStorage.setItem('luxe_admin_logged_in', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
